---
# ── Common Role Tasks ──────────────────────────────────────────────────

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  tags: [common, packages]

- name: Upgrade all packages
  apt:
    upgrade: dist
    autoremove: yes
  tags: [common, packages]

- name: Install common packages
  apt:
    name:
      - git
      - curl
      - wget
      - vim
      - htop
      - net-tools
      - python3
      - python3-pip
      - python3-venv
      - unzip
      - software-properties-common
      - apt-transport-https
      - ca-certificates
      - gnupg
      - lsb-release
    state: present
  tags: [common, packages]

- name: Set timezone to UTC
  timezone:
    name: UTC
  tags: [common]

- name: Create application directory
  file:
    path: "{{ app_directory }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'
  tags: [common]

- name: Add swap space
  block:
    - name: Check if swap exists
      stat:
        path: /swapfile
      register: swap_file

    - name: Create swap file
      command: fallocate -l 2G /swapfile
      when: not swap_file.stat.exists

    - name: Set swap permissions
      file:
        path: /swapfile
        mode: '0600'
      when: not swap_file.stat.exists

    - name: Make swap
      command: mkswap /swapfile
      when: not swap_file.stat.exists

    - name: Enable swap
      command: swapon /swapfile
      when: not swap_file.stat.exists

    - name: Add swap to fstab
      lineinfile:
        path: /etc/fstab
        line: '/swapfile none swap sw 0 0'
        state: present
  tags: [common, swap]
